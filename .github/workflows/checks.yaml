name: Check
on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
  workflow_call:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
jobs:
  check-components:
    runs-on: "ubuntu-24.04"
    name: "check"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          fetch-tags: true
          lfs: true
      - uses: ./.github/actions/setup-environment
        id: runner-context
      - name: check
        env:
          PACKAGE_VERSION: "${{ steps.runner-context.outputs.package-version }}"
        run: |
          uv version "$PACKAGE_VERSION"
          uv run ruff format --check
          uv run ruff check
          uv run pyright
          uv run pytest
