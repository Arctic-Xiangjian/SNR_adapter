train_data:
  roots:
    - /v/ai/nobackup/arctic/public_lowlevel/data/fastMRI/knee/multicoil_train
  format: fastmri
  kspace_key: kspace
  target_key: reconstruction_rss
  slice_axis: 0
  coil_axis: 1
  complex_format: native

val_data:
  roots:
    - /v/ai/nobackup/arctic/public_lowlevel/data/fastMRI/knee/multicoil_val
  format: fastmri
  kspace_key: kspace
  target_key: reconstruction_rss
  slice_axis: 0
  coil_axis: 1
  complex_format: native

test_data: null

subset:
  mode: random_volume
  fraction: 0.05
  seed: 42

preprocess:
  crop_size: [384, 384]
  acc_factor: 8
  center_fraction: 0.04
  calib_center_fraction: 0.04
  sampling_pattern: uniform
  ncc: 8
  grappa_kernel: [5, 5]
  grappa_lambda: 0.0001
  cov_corner_fraction: 0.125
  cov_shrinkage: 0.05
  cov_condition_max: 1000000.0
  eig_floor: 0.000001
  scale_percentile: 50.0
  deterministic_mask_from_name: true
  sample_seed: 42
  mc_gmap: 0
  gmap_mode: ones
  gmap_value: 1.0
  cache_dir: /working2/arctic/project2/cache/fastmri_x8_cf004_gmap_ones
  cache_version: multicoil_ones_gmap_v1

base_model:
  variant: large

correction:
  enabled: true
  hidden_chans: 64
  gmap_log_bound: 1.75
  complex_log_scale_bound: 0.75
  gmap_min: 0.01
  gmap_max: 12.0

lora:
  enabled: true
  r: 16
  alpha: 32.0
  dropout: 0.0
  target_modules:
    - \.attn\.key$
    - \.attn\.query$
    - \.attn\.value$
    - \.attn\.output_proj$
    - \.mlp\.0$
    - \.mlp\.2$

train:
  mode: warmup_then_both
  max_epochs: 50
  warmup_epochs: 4
  gmap_warmup_epochs: 2
  batch_size: 48
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  shuffle_train: true
  train_patch_size: [64, 64]
  eval_patch_batch_size: 64
  overlap_for_inference: [16, 16, 0]
  gradient_checkpoint_frozen_base: true
  frozen_base_eval: true
  correction_lr: 0.0005
  adapter_lr: 0.0001
  weight_decay: 0.0
  gradient_clip_val: 1.0
  train_pre_post: true
  complex_loss_weight: 1.0
  magnitude_loss_weight: 1.0
  evaluate_every_n_epochs: 1
  log_every_n_steps: 50
  save_best_only: true
  resume_from: null
  limit_train_batches: null
  limit_val_batches: null
  run_test_eval: false

runtime:
  device: cuda:0
  use_bf16: true
  seed: 3875032963
  save_root: /working2/arctic/project2/runs
  run_name: fastmri_x8_cf004_partial05_gmap_ones
